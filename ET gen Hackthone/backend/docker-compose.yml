version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: hiresignal_postgres
    environment:
      POSTGRES_DB: hiresignal
      POSTGRES_USER: hiresignal
      POSTGRES_PASSWORD: hiresignal123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hiresignal"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hiresignal_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://hiresignal:hiresignal123@postgres:5432/hiresignal
      POSTGRES_DSN: postgresql://hiresignal:hiresignal123@postgres:5432/hiresignal
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
